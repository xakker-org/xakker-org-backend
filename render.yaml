services:
  - type: web
    name: xakker-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: xakker-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "xakker-backend.onrender.com,api.xakker.org"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://xakker.org,https://self-study.xakker.org"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://xakker.org,https://self-study.xakker.org"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: DEFAULT_FROM_EMAIL
        value: "Xakker <no-reply@xakker.org>"
      # Secrets — not stored here; set the real values in the Render dashboard.
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

databases:
  - name: xakker-db
    databaseName: xakker_db
    user: xakker_user
    plan: free
