services:
  - type: web
    name: xakker-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: xakker-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "xakker-backend.onrender.com,api.xakker.org"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://xakker.org,https://self-study.xakker.org"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://xakker.org,https://self-study.xakker.org"
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: xakker-db
    databaseName: xakker_db
    user: xakker_user
    plan: free
