services:
  db:
    image: postgres:16-alpine
    container_name: xakker_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: xakker_db
      POSTGRES_USER: xakker_user
      POSTGRES_PASSWORD: xakker_password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xakker_user -d xakker_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
    container_name: xakker_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  pgdata:
